name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25.0'
  DOCKER_IMAGE: webpage-analyzer

jobs:
  # Lint and Format Check
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d .
            exit 1
          fi


  # Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'

      - name: Run integration tests
        run: |
          # Test health endpoint
          curl -f http://localhost:8080 || exit 1

          # Test metrics endpoint
          curl -f http://localhost:8080/metrics || exit 1

          # Test analysis with example.com (using HTTP to avoid SSL cert issues in Docker)
          response=$(curl -X POST -d "url=http://example.com" http://localhost:8080)
          echo "$response" | grep -q "HTML Version" || exit 1

      - name: Check Docker logs
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down

  # Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags='-w -s' -o webpage-analyzer-linux-amd64 ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpage-analyzer-linux-amd64
          path: webpage-analyzer-linux-amd64
          retention-days: 30

  # Create Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: webpage-analyzer-linux-amd64

      - name: Generate release tag
        id: tag
        run: |
          # Tag format: VYY.WeekNumber.counter
          # Example: V26.12.3 (Year 2026, Week 12, Build 3)

          YEAR=$(date +'%y')  # Last 2 digits of year (e.g., 26 for 2026)
          WEEK=$(date +'%V')  # ISO week number (01-53)

          # Find the latest tag for this week
          WEEK_PREFIX="V${YEAR}.${WEEK}"
          LATEST_TAG=$(git tag -l "${WEEK_PREFIX}.*" | sort -V | tail -n1)

          if [ -z "$LATEST_TAG" ]; then
            # First build of this week
            COUNTER=1
          else
            # Increment counter for this week
            COUNTER=$(echo $LATEST_TAG | cut -d. -f3)
            COUNTER=$((COUNTER + 1))
          fi

          NEW_TAG="${WEEK_PREFIX}.${COUNTER}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG (Year: 20${YEAR}, Week: ${WEEK}, Build: ${COUNTER})"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous release tag (any tag, not just this week)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release ever - get all commits
            echo "## 🎉 Initial Release" > changelog.md
            echo "" >> changelog.md
            echo "### All Changes" >> changelog.md
            git log --pretty=format:"- %s (%h)" >> changelog.md
          else
            # Get commits since last tag
            echo "## 📝 Changelog" > changelog.md
            echo "" >> changelog.md
            echo "**Changes since ${PREVIOUS_TAG}:**" >> changelog.md
            echo "" >> changelog.md

            # Group commits by type
            echo "### Features & Enhancements" >> changelog.md
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^feat" --grep="^add" --grep="^enhance" -i >> changelog.md || echo "_No features in this release_" >> changelog.md
            echo "" >> changelog.md

            echo "### Bug Fixes" >> changelog.md
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^fix" --grep="^bug" -i >> changelog.md || echo "_No bug fixes in this release_" >> changelog.md
            echo "" >> changelog.md

            echo "### Documentation" >> changelog.md
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^doc" --grep="^docs" -i >> changelog.md || echo "_No documentation changes_" >> changelog.md
            echo "" >> changelog.md

            echo "### Other Changes" >> changelog.md
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^add" --grep="^enhance" --grep="^fix" --grep="^bug" --grep="^doc" --grep="^docs" -i >> changelog.md || echo "_No other changes_" >> changelog.md
            echo "" >> changelog.md

            # Add comparison link
            echo "---" >> changelog.md
            echo "" >> changelog.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ steps.tag.outputs.tag }}" >> changelog.md
          fi

          # Output for use in release
          cat changelog.md
          echo "changelog_file=changelog.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body_path: changelog.md
          append_body: true
          files: |
            webpage-analyzer-linux-amd64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release metadata
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: |

            ---

            ## 📦 Release Information
            - **Version**: ${{ steps.tag.outputs.tag }}
            - **Commit**: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Build Date**: $(date +'%Y-%m-%d %H:%M:%S UTC')
            - **Triggered by**: @${{ github.actor }}

            ### Version Format
            `VYY.WeekNumber.Counter`
            - **YY**: Last 2 digits of year (e.g., 26 for 2026)
            - **WeekNumber**: ISO week number (01-53)
            - **Counter**: Build number for the week (resets weekly)

            ## 📥 Artifacts
            | File | Description | Size |
            |------|-------------|------|
            | `webpage-analyzer-linux-amd64` | Linux AMD64 binary (CGO disabled, statically linked) | ~10MB |

          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

