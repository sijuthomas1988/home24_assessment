name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25.0'
  DOCKER_IMAGE: webpage-analyzer

jobs:
  # Lint and Format Check
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d .
            exit 1
          fi


  # Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags='-w -s' -o webpage-analyzer-linux-amd64 ./cmd/server

#  # Docker Build and Push, Should add this to push image to Image Repository
#  docker:
#    name: Docker Build
#    runs-on: ubuntu-latest
#    needs: [lint]


  # Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker-compose up -d

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'

      - name: Run integration tests
        run: |
          # Test health endpoint
          curl -f http://localhost:8080 || exit 1

          # Test metrics endpoint
          curl -f http://localhost:8080/metrics || exit 1

          # Test analysis with example.com
          response=$(curl -X POST -d "url=https://example.com" http://localhost:8080)
          echo "$response" | grep -q "HTML Version" || exit 1

      - name: Check Docker logs
        if: failure()
        run: docker-compose logs

      - name: Stop services
        if: always()
        run: docker-compose down