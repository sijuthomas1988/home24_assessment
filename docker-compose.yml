version: '3.8'

services:
  webpage-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webpage-analyzer
    image: webpage-analyzer:latest
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - analyzer-network
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - analyzer-network
    depends_on:
      - webpage-analyzer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  analyzer-network:
    driver: bridge

volumes:
  prometheus-data: